name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permet de lancer manuellement depuis l'onglet "Actions" sur GitHub.
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tests (Vitest, si disponible)
        # Le squelette Vitest est livré avec le repo ; on tolère l'absence du
        # script `test` pour ne pas casser la CI le jour où on l'enlèverait.
        run: |
          if jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            npm test -- --run
          else
            echo "Pas de script test défini, on saute."
          fi

  backend:
    name: Backend · auth smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        # On installe uniquement le set minimal (pas TF/Chroma) pour valider
        # que le module auth + l'API minimale démarrent correctement.
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" "python-jose[cryptography]" "passlib[bcrypt]" python-multipart pydantic httpx pytest

      - name: Auth smoke test
        run: |
          python - <<'PY'
          # Sanity check : import du module auth + login JWT + verify_password.
          import os
          os.environ.setdefault("ENV", "dev")
          from app import auth
          token = auth.create_access_token({"sub": "ci-bot"})
          assert isinstance(token, str) and len(token) > 20
          payload = auth.decode_token(token)
          assert payload["sub"] == "ci-bot"
          # Crée les users par défaut, vérifie un login admin.
          assert auth.authenticate_user("admin", "admin123") is not None
          assert auth.authenticate_user("admin", "wrong-pass") is None
          print("OK auth smoke test")
          PY

      - name: API minimal import test
        run: |
          python -c "from app.api_minimal import app; print('routes:', len(app.routes))"
